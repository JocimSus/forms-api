openapi: 3.0.3
info:
  title: Whale Forms API
  version: "1.0.0"
  description: |
    Whale Forms API Documentation
servers:
  - url: http://localhost:4000/v1
    description: Local server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email

    Question:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        type:
          type: string
          enum: [SHORT_ANSWER, MULTIPLE_CHOICE, CHECKBOX, DROPDOWN]

    Form:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        creatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        creator:
          $ref: "#/components/schemas/User"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"

    Error:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: object

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        200:
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: string
                    example: connected
        503:
          description: Server is unhealthy

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  minLength: 2
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        409:
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        400:
          description: Validation error
        401:
          description: Invalid credentials

  /auth/logout:
    post:
      summary: Logout user
      tags: [Auth]
      responses:
        204:
          description: Logout successful

  /auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        200:
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        401:
          description: Unauthorized

  /forms:
    get:
      summary: Get all forms
      tags: [Forms]
      responses:
        200:
          description: List of forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form"
    post:
      summary: Create a new form
      tags: [Forms]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 3
                description:
                  type: string
                questions:
                  type: array
                  items:
                    type: object
                    required: [text, type]
                    properties:
                      text:
                        type: string
                      type:
                        type: string
                        enum: [SHORT_ANSWER, MULTIPLE_CHOICE, CHECKBOX, DROPDOWN]
                      required:
                        type: boolean
                      options:
                        type: array
                        items:
                          type: string
      responses:
        201:
          description: Form created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        400:
          description: Validation error
        401:
          description: Unauthorized

  /forms/{id}:
    get:
      summary: Get form by ID
      tags: [Forms]
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Form ID
      responses:
        200:
          description: Form details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        404:
          description: Form not found
    patch:
      summary: Update a form
      tags: [Forms]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Form ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 3
                description:
                  type: string
                  nullable: true
      responses:
        200:
          description: Form updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        401:
          description: Unauthorized
        403:
          description: Forbidden - Not the creator
        404:
          description: Form not found
    delete:
      summary: Delete a form
      tags: [Forms]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Form ID
      responses:
        204:
          description: Form deleted successfully
        401:
          description: Unauthorized
        403:
          description: Forbidden - Not the creator
        404:
          description: Form not found
