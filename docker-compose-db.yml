services:
  db:
    image: postgres:18
    container_name: forms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forms
      POSTGRES_PASSWORD: forms
      POSTGRES_DB: forms
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mail.com
      PGADMIN_DEFAULT_PASSWORD: admin10110
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:

